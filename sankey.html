<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>

<div id="chart" style="width:2000px;height:1200px;"></div>

<script>

// CSV URL
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTiubOxhWDiRf1x8aY43PQWr6rPjM5tbY2GAvRcSU-87-tolmEjLGKQA5yG7jDx8nX9S7SNTbPhQcdl/pub?gid=742266700&single=true&output=csv";

fetch(csvURL)
.then(r => r.text())
.then(text => {

    const rows = text.trim().split("\n").slice(1).map(r => r.split(","));

    const from = rows.map(r => r[0]);
    const to = rows.map(r => r[1]);
    const value = rows.map(r => Number(r[2]));
    const level = rows.map(r => Number(r[3]));
    const type = rows.map(r => r[4]);

    // Build unique nodes
    const labels = [];
    const nodeLevels = [];
    const nodeValues = {};
    const nodeTypes = [];

    rows.forEach((r,i) => {
        [r[0], r[1]].forEach((name,j) => {
            if (!labels.includes(name)) {
                labels.push(name);
                nodeLevels.push(j === 0 ? level[i] : level[i]+1);
                nodeValues[name] = 0;
                nodeTypes.push(type[i]);
            }
            nodeValues[name] += Number(r[2]);
        });
    });

    const colorMap = {
        "income": "#4292c6",
        "cost": "#F28C8C",
        "profit": "#7FBF7F"
    };

    const nodeColors = nodeTypes.map(t => colorMap[t] || "#CCCCCC");

    const index = name => labels.indexOf(name);
    const source = from.map(index);
    const target = to.map(index);

    // Horizontal positions
    const maxLevel = Math.max(...nodeLevels);
    const x = nodeLevels.map(l => l / maxLevel);

    // Vertical positions
    const nodesPerLevel = {};
    nodeLevels.forEach((l,i) => {
        if (!nodesPerLevel[l]) nodesPerLevel[l] = [];
        nodesPerLevel[l].push(i);
    });

    const y = Array(labels.length).fill(0);
    Object.keys(nodesPerLevel).forEach(l => {
        const nodes = nodesPerLevel[l];
        const step = 1 / (nodes.length + 1);
        nodes.forEach((node,i) => {
            y[node] = step * (i + 1);
        });
    });

    // Flow coloring rule
    const linkColors = source.map((s,i) => {
        if (nodeTypes[s] === "income") {
            return nodeColors[s];   // outgoing from income
        } else {
            return nodeColors[target[i]]; // otherwise color by destination
        }
    });

    // Sankey data
    const data = [{
        type: "sankey",
        orientation: "h",
        node: { 
            label: [],
            color: nodeColors,
            x: x,
            y: y,
            pad: 20,
            thickness: 25,
            line: { color: "#000", width: 0.5 }
        },
        link: { 
            source, 
            target, 
            value, 
            color: linkColors,
            label: value.map(v => v.toLocaleString('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }))
        }
    }];

    // Text labels (no box)
    const annotations = labels.map((l,i) => ({
        x: x[i],
        y: y[i],
        xref: 'paper',
        yref: 'paper',
        text: `${l}<br>$${nodeValues[l].toLocaleString()}`,
        showarrow: false,
        font: { size: 12, color: '#000' },
        align: 'center'
    }));

    const layout = {
        title: "Meta-style Sankey Chart",
        font: { size: 14 },
        margin: { t: 80, l: 80, r: 80, b: 80 },
        hovermode: 'x',
        annotations
    };

    Plotly.newPlot("chart", data, layout);

});
</script>

</body>
</html>
